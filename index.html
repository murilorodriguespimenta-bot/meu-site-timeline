<!DOCTYPE html>
<html>
<head>
  <title>Minha Timeline</title>

  <script src="https://unpkg.com/vis-timeline@latest/standalone/umd/vis-timeline-graph2d.min.js"></script>
  <link href="https://unpkg.com/vis-timeline@latest/styles/vis-timeline-graph2d.min.css" rel="stylesheet" />

  <style>
    body { font-family: Arial; margin: 20px; }

    #timeline {
      height: 500px;
      border: 1px solid #ccc;
      margin-top: 20px;
    }

    button { padding: 6px 10px; margin: 5px; }

    /* MODAL */
    #modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
    }

    #modalContent {
      background: white;
      padding: 20px;
      width: 320px;
      margin: 80px auto;
      border-radius: 8px;
      position: relative;
    }

    #closeBtn {
      position: absolute;
      top: 5px;
      right: 10px;
      cursor: pointer;
      font-weight: bold;
    }

    input, textarea {
      width: 100%;
      margin: 5px 0;
      padding: 5px;
    }

    textarea {
      resize: none;
      height: 80px;
    }
  </style>
</head>

<body>

<h2>Minha Timeline</h2>

<button onclick="abrirModalCriar()">Add Event</button>

<div id="timeline"></div>

<!-- MODAL -->
<div id="modal">
  <div id="modalContent">
    <span id="closeBtn" onclick="fecharModal()">X</span>

    <h3 id="modalTitle">Evento</h3>

    <input type="hidden" id="editId">
    <input type="text" id="titulo" placeholder="Nome do evento">
    <input type="date" id="inicio">
    <input type="date" id="fim">
    <input type="text" id="categoria" placeholder="Categoria">

    <label>Cor da categoria:</label>
    <input type="color" id="cor">

    <textarea id="notas" maxlength="500" placeholder="Notas (até 500 caracteres)"></textarea>

    <div id="botoes"></div>
  </div>
</div>

<script>
const API_URL = "https://sheetdb.io/api/v1/lgoh46p9jt5uf";

let timeline;

// ===== UTIL =====
function gerarCor() {
  return '#' + Math.floor(Math.random()*16777215).toString(16);
}

function normalizarTexto(txt) {
  return (txt || "").trim();
}

function formatarData(data) {
  if (!data) return "";
  const d = new Date(data);
  if (isNaN(d)) return "";
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function formatarDataBR(data) {
  if (!data) return "—";
  const d = new Date(data);
  if (isNaN(d)) return "—";
  return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
}

function calcularDuracao(inicio, fim) {
  const start = new Date(inicio);
  const end = fim ? new Date(fim) : new Date(inicio);

  if (isNaN(start) || isNaN(end)) return "";

  let anos = end.getFullYear() - start.getFullYear();
  let meses = end.getMonth() - start.getMonth();
  let dias = end.getDate() - start.getDate();

  if (dias < 0) { meses--; dias += 30; }
  if (meses < 0) { anos--; meses += 12; }

  let partes = [];
  if (anos > 0) partes.push(`${anos} ano${anos>1?'s':''}`);
  if (meses > 0) partes.push(`${meses} mês${meses>1?'es':''}`);
  if (dias > 0) partes.push(`${dias} dia${dias>1?'s':''}`);

  return partes.length ? partes.join(", ") : "Mesmo dia";
}

// ===== MAPA DE CORES =====
function mapearCores(data) {
  const mapa = {};
  data.forEach(e => {
    const cat = normalizarTexto(e.categoria);
    if (!mapa[cat]) {
      mapa[cat] = e.cor || gerarCor();
    }
  });
  return mapa;
}

// ===== MODAL =====
function abrirModalCriar() {
  document.getElementById("modal").style.display = "block";
  document.getElementById("modalTitle").innerText = "Novo Evento";
  limparForm();

  document.getElementById("botoes").innerHTML = `
    <button onclick="salvarEvento()">Salvar</button>
  `;
}

function abrirModalEditar(evento) {
  document.getElementById("modal").style.display = "block";

  editId.value = evento.id;
  titulo.value = evento.titulo;
  inicio.value = formatarData(evento.inicio);
  fim.value = formatarData(evento.fim);
  categoria.value = evento.categoria;
  notas.value = evento.notas || "";
  cor.value = evento.cor || "#cccccc";

  document.getElementById("botoes").innerHTML = `
    <button onclick="atualizarEvento()">Atualizar</button>
    <button onclick="deletarEvento()">Deletar</button>
  `;
}

function fecharModal() {
  document.getElementById("modal").style.display = "none";
}

// ===== TIMELINE =====
function carregarTimeline() {
  fetch(API_URL)
    .then(res => res.json())
    .then(data => {

      const mapaCores = mapearCores(data);

      const items = data.map(e => {
        const cat = normalizarTexto(e.categoria);
        const corItem = mapaCores[cat];

        return {
          id: Number(e.id),
          content: "",
          start: e.inicio,
          end: e.fim || null,
          group: cat,
          subgroup: e.id,
          style: `background-color:${corItem}; border-color:${corItem};`,
          title: `
<strong>${e.titulo}</strong><br>
Início: ${formatarDataBR(e.inicio)}<br>
Fim: ${formatarDataBR(e.fim)}<br>
Duração: ${calcularDuracao(e.inicio, e.fim)}
${e.notas ? `<br><em>${e.notas.substring(0,100)}...</em>` : ""}
          `
        };
      });

      const groups = [...new Set(data.map(e => normalizarTexto(e.categoria)))]
        .map(cat => ({ id: cat, content: cat }));

      if (timeline) timeline.destroy();

      timeline = new vis.Timeline(
        document.getElementById('timeline'),
        items,
        groups,
        {
          orientation: 'top', // ✅ DATAS EM CIMA
          stack: true,
          stackSubgroups: true,

          format: {
            majorLabels: { year: 'YYYY' },
            minorLabels: { month: 'MMM' }
          },

          zoomMin: 1000 * 60 * 60 * 24 * 30,
          zoomMax: 1000 * 60 * 60 * 24 * 365 * 500
        }
      );

      timeline.on('select', function (props) {
        if (props.items.length > 0) {
          const evento = data.find(e => Number(e.id) === props.items[0]);
          abrirModalEditar(evento);
        }
      });

    });
}

// ===== CRUD =====
function gerarNovoId(data) {
  return Math.max(...data.map(e => Number(e.id))) + 1;
}

function salvarEvento() {
  fetch(API_URL)
    .then(res => res.json())
    .then(data => {

      fetch(API_URL, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
          data: [{
            id: gerarNovoId(data),
            titulo: titulo.value,
            inicio: inicio.value,
            fim: fim.value,
            categoria: normalizarTexto(categoria.value),
            notas: notas.value,
            cor: cor.value
          }]
        })
      }).then(() => {
        fecharModal();
        carregarTimeline();
      });
    });
}

function atualizarEvento() {
  fetch(`${API_URL}/id/${editId.value}`, {
    method: "PUT",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      data: {
        titulo: titulo.value,
        inicio: inicio.value,
        fim: fim.value,
        categoria: normalizarTexto(categoria.value),
        notas: notas.value,
        cor: cor.value
      }
    })
  }).then(() => {
    fecharModal();
    carregarTimeline();
  });
}

function deletarEvento() {
  fetch(`${API_URL}/id/${editId.value}`, { method: "DELETE" })
    .then(() => {
      fecharModal();
      carregarTimeline();
    });
}

function limparForm() {
  editId.value = "";
  titulo.value = "";
  inicio.value = "";
  fim.value = "";
  categoria.value = "";
  notas.value = "";
  cor.value = "#cccccc";
}

// INIT
carregarTimeline();
</script>

</body>
</html>
