<!DOCTYPE html>
<html>
<head>
  <title>Minha Timeline</title>

  <script src="https://unpkg.com/vis-timeline@latest/standalone/umd/vis-timeline-graph2d.min.js"></script>
  <link href="https://unpkg.com/vis-timeline@latest/styles/vis-timeline-graph2d.min.css" rel="stylesheet" />

  <style>
    body { font-family: Arial; margin: 20px; }

    #timeline {
      height: 500px;
      border: 1px solid #ccc;
      margin-top: 20px;
    }

    button { padding: 6px 10px; margin: 5px; }

    #modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
    }

    #modalContent {
      background: white;
      padding: 20px;
      width: 320px;
      margin: 80px auto;
      border-radius: 8px;
      position: relative;
    }

    #closeBtn {
      position: absolute;
      top: 5px;
      right: 10px;
      cursor: pointer;
      font-weight: bold;
    }

    input, textarea {
      width: 100%;
      margin: 5px 0;
      padding: 5px;
    }
  </style>
</head>

<body>

<h2>Minha Timeline</h2>

<button onclick="abrirModalCriar()">Add Event</button>

<div id="timeline"></div>

<!-- MODAL -->
<div id="modal">
  <div id="modalContent">
    <span id="closeBtn" onclick="fecharModal()">X</span>

    <h3 id="modalTitle">Editar</h3>

    <input type="hidden" id="editId">
    <input type="text" id="titulo" placeholder="Nome do evento">
    <input type="date" id="inicio">
    <input type="date" id="fim">
    <input type="text" id="categoria">

    <label>Cor:</label>
    <input type="color" id="cor">

    <textarea id="notas" maxlength="500"></textarea>

    <div id="botoes"></div>
  </div>
</div>

<script>
const API_URL = "https://sheetdb.io/api/v1/lgoh46p9jt5uf";
let timeline;

// ===== UTIL =====
function normalizar(txt){ return (txt||"").trim(); }
function gerarCor(){ return '#' + Math.floor(Math.random()*16777215).toString(16); }

// ===== MODAL =====
function abrirModalCriar(){
  modal.style.display="block";
  modalTitle.innerText="Novo Evento";
  limparForm();

  botoes.innerHTML=`<button onclick="salvarEvento()">Salvar</button>`;
}

function abrirModalEditarEvento(e){
  modal.style.display="block";
  modalTitle.innerText="Editar Evento";

  editId.value=e.id;
  titulo.value=e.titulo;
  inicio.value=e.inicio;
  fim.value=e.fim;
  categoria.value=e.categoria;
  notas.value=e.notas||"";
  cor.value=e.cor||"#cccccc";

  botoes.innerHTML=`
    <button onclick="atualizarEvento()">Atualizar</button>
    <button onclick="deletarEvento()">Deletar</button>
  `;
}

// 🔥 NOVO MODAL CATEGORIA
function abrirModalCategoria(cat, corAtual){
  modal.style.display="block";
  modalTitle.innerText="Editar Categoria";

  editId.value=""; // não é evento
  titulo.value="";
  inicio.value="";
  fim.value="";
  notas.value="";

  categoria.value=cat;
  cor.value=corAtual || "#cccccc";

  botoes.innerHTML=`
    <button onclick="atualizarCategoria('${cat}')">Atualizar</button>
  `;
}

function fecharModal(){ modal.style.display="none"; }

// ===== TIMELINE =====
function carregarTimeline(){
  fetch(API_URL)
  .then(r=>r.json())
  .then(data=>{

    const mapa={};
    data.forEach(e=>{
      const cat=normalizar(e.categoria);
      if(!mapa[cat]) mapa[cat]=e.cor||gerarCor();
    });

    const items=data.map(e=>{
      const cat=normalizar(e.categoria);
      return{
        id:Number(e.id),
        content:"",
        start:e.inicio,
        end:e.fim||null,
        group:cat,
        subgroup:e.id,
        style:`background:${mapa[cat]};border-color:${mapa[cat]}`
      };
    });

    const groups=[...new Set(data.map(e=>normalizar(e.categoria)))]
      .map(cat=>({
        id:cat,
        content:cat
      }));

    if(timeline) timeline.destroy();

    timeline=new vis.Timeline(
      document.getElementById('timeline'),
      items,
      groups,
      {
        orientation:'top',
        stack:true,
        stackSubgroups:true
      }
    );

    // 🔥 CLICK EVENTO
    timeline.on('select', props=>{
      if(props.items.length){
        const ev=data.find(e=>Number(e.id)===props.items[0]);
        abrirModalEditarEvento(ev);
      }
    });

    // 🔥 CLICK CATEGORIA
    timeline.on('click', function (props) {
      if (props.what === 'group-label') {
        const cat = props.group;
        const corAtual = mapa[cat];
        abrirModalCategoria(cat, corAtual);
      }
    });

  });
}

// ===== CRUD EVENTO =====
function gerarNovoId(data){
  return Math.max(...data.map(e=>Number(e.id)))+1;
}

function salvarEvento(){
  fetch(API_URL).then(r=>r.json()).then(data=>{
    fetch(API_URL,{
      method:"POST",
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        data:[{
          id:gerarNovoId(data),
          titulo:titulo.value,
          inicio:inicio.value,
          fim:fim.value,
          categoria:categoria.value,
          notas:notas.value,
          cor:cor.value
        }]
      })
    }).then(()=>{fecharModal();carregarTimeline();});
  });
}

function atualizarEvento(){
  fetch(`${API_URL}/id/${editId.value}`,{
    method:"PUT",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      data:{
        titulo:titulo.value,
        inicio:inicio.value,
        fim:fim.value,
        categoria:categoria.value,
        notas:notas.value,
        cor:cor.value
      }
    })
  }).then(()=>{fecharModal();carregarTimeline();});
}

function deletarEvento(){
  fetch(`${API_URL}/id/${editId.value}`,{method:"DELETE"})
  .then(()=>{fecharModal();carregarTimeline();});
}

// ===== 🔥 ATUALIZAR CATEGORIA =====
function atualizarCategoria(catAntiga){
  fetch(API_URL)
  .then(r=>r.json())
  .then(data=>{

    const novaCat = categoria.value;
    const novaCor = cor.value;

    const updates = data
      .filter(e => normalizar(e.categoria) === normalizar(catAntiga))
      .map(e => {
        return fetch(`${API_URL}/id/${e.id}`, {
          method: "PUT",
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({
            data: {
              categoria: novaCat,
              cor: novaCor
            }
          })
        });
      });

    Promise.all(updates).then(()=>{
      fecharModal();
      carregarTimeline();
    });

  });
}

// ===== UTIL =====
function limparForm(){
  editId.value="";
  titulo.value="";
  inicio.value="";
  fim.value="";
  categoria.value="";
  notas.value="";
  cor.value="#cccccc";
}

// INIT
carregarTimeline();
</script>

</body>
</html>
