<script>
function carregarTimeline() {
  fetch(API_URL)
    .then(res => res.json())
    .then(data => {

      const mapaCores = mapearCores(data);

      const items = data.map(e => {
        const cor = mapaCores[(e.categoria || "").trim()];

        return {
          id: Number(e.id),
          content: "",
          start: e.inicio,
          end: e.fim || null,
          group: e.categoria,
          subgroup: e.id,
          style: `background-color:${cor}; border-color:${cor};`
        };
      });

      const groups = [...new Set(data.map(e => e.categoria))]
        .map(cat => ({
          id: cat,
          content: cat
        }));

      if (timeline) timeline.destroy();

      timeline = new vis.Timeline(
        document.getElementById('timeline'),
        items,
        groups,
        {
          orientation: 'top', // ✅ CORREÇÃO AQUI
          stack: true,
          stackSubgroups: true,

          format: {
            majorLabels: { year: 'YYYY' },
            minorLabels: { month: 'MMM' }
          }
        }
      );

      timeline.on('select', function (props) {
        if (props.items.length > 0) {
          const evento = data.find(e => Number(e.id) === props.items[0]);
          abrirModalEditar(evento);
        }
      });

    });
}
</script>
