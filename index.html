<!DOCTYPE html>
<html>
<head>
  <title>Minha Timeline</title>

  <!-- Biblioteca timeline -->
  <script src="https://unpkg.com/vis-timeline@latest/standalone/umd/vis-timeline-graph2d.min.js"></script>
  <link href="https://unpkg.com/vis-timeline@latest/styles/vis-timeline-graph2d.min.css" rel="stylesheet" />

  <style>
    body { font-family: Arial; margin: 20px; }
    #timeline { height: 500px; border: 1px solid #ccc; margin-top: 20px; }
    form { margin-bottom: 20px; }
    input, button { margin: 5px; padding: 5px; }
  </style>
</head>

<body>

<h2>Minha Timeline</h2>

<form id="formEvento">
  <input type="text" id="titulo" placeholder="Nome do evento" required>
  <input type="date" id="inicio" required>
  <input type="date" id="fim">
  <input type="text" id="categoria" placeholder="Categoria (camada)" required>
  <button type="submit">Adicionar Evento</button>
</form>

<div id="timeline"></div>

<script>
const API_URL = "https://sheetdb.io/api/v1/lgoh46p9jt5uf";

let timeline;
let container = document.getElementById('timeline');

function carregarTimeline() {
  fetch(API_URL)
    .then(res => res.json())
    .then(data => {

      const items = data.map(e => ({
        id: Number(e.id),
        content: e.titulo,
        start: e.inicio,
        end: e.fim || null,
        group: e.categoria
      }));

      const gruposUnicos = [...new Set(data.map(e => e.categoria))];

      const groups = gruposUnicos.map(cat => ({
        id: cat,
        content: cat
      }));

      if (timeline) timeline.destroy();

      timeline = new vis.Timeline(container, items, groups, {
        stack: false,

        // 🔹 FORÇA EXIBIÇÃO DE ANOS
        timeAxis: {
          scale: 'year',
          step: 1
        },

        // 🔹 FORMATO DO TOPO (major) E SUBDIVISÃO
        format: {
          majorLabels: {
            year: 'YYYY'
          },
          minorLabels: {
            month: 'MMM'
          }
        },

        // 🔹 ZOOM LIMITES (ajuda a manter anos visíveis)
        zoomMin: 1000 * 60 * 60 * 24 * 30 * 6,   // ~6 meses
        zoomMax: 1000 * 60 * 60 * 24 * 365 * 200 // 200 anos

      });

    });
}

// carregar inicial
carregarTimeline();

// FORM
document.getElementById("formEvento").addEventListener("submit", function(e) {
  e.preventDefault();

  const novoEvento = {
    data: [{
      id: Date.now(),
      titulo: document.getElementById("titulo").value,
      inicio: document.getElementById("inicio").value,
      fim: document.getElementById("fim").value,
      categoria: document.getElementById("categoria").value
    }]
  };

  fetch(API_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(novoEvento)
  })
  .then(res => res.json())
  .then(() => {
    document.getElementById("formEvento").reset();
    carregarTimeline();
  });
});
</script>

</body>
</html>
