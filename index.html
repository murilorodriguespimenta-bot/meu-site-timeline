<!DOCTYPE html>
<html>
<head>
  <title>Minha Timeline</title>

  <script src="https://unpkg.com/vis-timeline@latest/standalone/umd/vis-timeline-graph2d.min.js"></script>
  <link href="https://unpkg.com/vis-timeline@latest/styles/vis-timeline-graph2d.min.css" rel="stylesheet" />

  <style>
    body { font-family: Arial; margin: 20px; }
    #timeline { height: 500px; border: 1px solid #ccc; margin-top: 20px; }
    input, button { margin: 5px; padding: 5px; }
  </style>
</head>

<body>

<h2>Minha Timeline</h2>

<form id="formEvento">
  <input type="hidden" id="editId">
  <input type="text" id="titulo" placeholder="Nome do evento" required>
  <input type="date" id="inicio" required>
  <input type="date" id="fim">
  <input type="text" id="categoria" placeholder="Categoria" required>
  <button type="submit">Salvar</button>
</form>

<div id="timeline"></div>

<script>
const API_URL = "https://sheetdb.io/api/v1/lgoh46p9jt5uf";

let timeline;
let container = document.getElementById('timeline');

// FORMATAR DATA (input)
function formatarData(data) {
  if (!data) return "";
  const d = new Date(data);
  if (isNaN(d)) return "";

  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// FORMATAR DATA (exibição)
function formatarDataBR(data) {
  if (!data) return "—";
  const d = new Date(data);
  if (isNaN(d)) return "—";

  return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
}

// NORMALIZAR TEXTO
function normalizarTexto(txt) {
  return (txt || "").trim();
}

// CALCULAR DURAÇÃO
function calcularDuracao(inicio, fim) {
  const start = new Date(inicio);
  const end = fim ? new Date(fim) : new Date(inicio);

  if (isNaN(start) || isNaN(end)) return "";

  let anos = end.getFullYear() - start.getFullYear();
  let meses = end.getMonth() - start.getMonth();
  let dias = end.getDate() - start.getDate();

  if (dias < 0) { meses--; dias += 30; }
  if (meses < 0) { anos--; meses += 12; }

  let partes = [];
  if (anos > 0) partes.push(`${anos} ano${anos>1?'s':''}`);
  if (meses > 0) partes.push(`${meses} mês${meses>1?'es':''}`);
  if (dias > 0) partes.push(`${dias} dia${dias>1?'s':''}`);

  return partes.length ? partes.join(", ") : "Mesmo dia";
}

function carregarTimeline() {
  fetch(API_URL)
    .then(res => res.json())
    .then(data => {

      const dadosValidos = data.filter(e => e.inicio && !isNaN(new Date(e.inicio)));

      const items = dadosValidos.map(e => {

        const inicioBR = formatarDataBR(e.inicio);
        const fimBR = formatarDataBR(e.fim);
        const duracao = calcularDuracao(e.inicio, e.fim);

        return {
          id: Number(e.id),
          content: e.titulo,
          start: e.inicio,
          end: e.fim || null,
          group: normalizarTexto(e.categoria),
          subgroup: e.id,

          // 🔥 TOOLTIP COMPLETO
          title: `
<strong>${e.titulo}</strong><br>
Início: ${inicioBR}<br>
Fim: ${fimBR}<br>
Duração: ${duracao}
          `
        };
      });

      const gruposUnicos = [...new Set(dadosValidos.map(e => normalizarTexto(e.categoria)))];

      const groups = gruposUnicos.map(cat => ({
        id: cat,
        content: cat
      }));

      const datasInicio = items.map(i => new Date(i.start)).filter(d => !isNaN(d));
      const datasFim = items.map(i => new Date(i.end || i.start)).filter(d => !isNaN(d));

      const dataMin = new Date(Math.min(...datasInicio));
      const dataMax = new Date(Math.max(...datasFim));

      if (timeline) timeline.destroy();

      timeline = new vis.Timeline(container, items, groups, {

        orientation: 'top',
        stack: true,
        stackSubgroups: true,

        format: {
          majorLabels: { year: 'YYYY' },
          minorLabels: { month: 'MMM' }
        },

        start: dataMin,
        end: dataMax,

        zoomMin: 1000 * 60 * 60 * 24 * 30,
        zoomMax: 1000 * 60 * 60 * 24 * 365 * 500
      });

      timeline.on('select', function (props) {
        if (props.items.length > 0) {
          const id = props.items[0];
          const evento = data.find(e => Number(e.id) === id);

          document.getElementById("editId").value = evento.id;
          document.getElementById("titulo").value = evento.titulo;
          document.getElementById("categoria").value = normalizarTexto(evento.categoria);
          document.getElementById("inicio").value = formatarData(evento.inicio);
          document.getElementById("fim").value = formatarData(evento.fim);
        }
      });

    });
}

// LOAD
carregarTimeline();

function gerarNovoId(data) {
  const ids = data.map(e => Number(e.id)).filter(n => !isNaN(n));
  return ids.length ? Math.max(...ids) + 1 : 1;
}

// CREATE + UPDATE
document.getElementById("formEvento").addEventListener("submit", function(e) {
  e.preventDefault();

  const id = document.getElementById("editId").value;

  fetch(API_URL)
    .then(res => res.json())
    .then(data => {

      const evento = {
        titulo: document.getElementById("titulo").value,
        inicio: document.getElementById("inicio").value,
        fim: document.getElementById("fim").value || "",
        categoria: normalizarTexto(document.getElementById("categoria").value)
      };

      if (id) {
        fetch(`${API_URL}/id/${id}`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ data: evento })
        })
        .then(() => {
          limparForm();
          carregarTimeline();
        });

      } else {
        const novoId = gerarNovoId(data);

        fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            data: [{
              id: novoId,
              ...evento
            }]
          })
        })
        .then(() => {
          limparForm();
          carregarTimeline();
        });
      }

    });
});

function limparForm() {
  document.getElementById("formEvento").reset();
  document.getElementById("editId").value = "";
}
</script>

</body>
</html>
</script>

</body>
</html>
