<!DOCTYPE html>
<html>
<head>
  <title>Minha Timeline</title>

  <script src="https://unpkg.com/vis-timeline@latest/standalone/umd/vis-timeline-graph2d.min.js"></script>
  <link href="https://unpkg.com/vis-timeline@latest/styles/vis-timeline-graph2d.min.css" rel="stylesheet" />

  <style>
    body { font-family: Arial; margin: 20px; }

    #timeline {
      height: 500px;
      border: 1px solid #ccc;
      margin-top: 20px;
    }

    button { padding: 6px 10px; margin: 5px; }

    /* MODAL */
    #modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
    }

    #modalContent {
      background: white;
      padding: 20px;
      width: 320px;
      margin: 80px auto;
      border-radius: 8px;
      position: relative;
    }

    #closeBtn {
      position: absolute;
      top: 5px;
      right: 10px;
      cursor: pointer;
      font-weight: bold;
    }

    input, textarea {
      width: 100%;
      margin: 5px 0;
      padding: 5px;
    }

    textarea {
      resize: none;
      height: 80px;
    }
  </style>
</head>

<body>

<h2>Minha Timeline</h2>

<button onclick="abrirModalCriar()">Add Event</button>

<div id="timeline"></div>

<!-- MODAL -->
<div id="modal">
  <div id="modalContent">
    <span id="closeBtn" onclick="fecharModal()">X</span>

    <h3 id="modalTitle">Evento</h3>

    <input type="hidden" id="editId">
    <input type="text" id="titulo" placeholder="Nome do evento">
    <input type="date" id="inicio">
    <input type="date" id="fim">
    <input type="text" id="categoria" placeholder="Categoria">

    <!-- 🔥 NOVO CAMPO -->
    <textarea id="notas" maxlength="500" placeholder="Notas (até 500 caracteres)"></textarea>

    <div id="botoes"></div>
  </div>
</div>

<script>
const API_URL = "https://sheetdb.io/api/v1/lgoh46p9jt5uf";

let timeline;

// ===== MODAL =====
function abrirModalCriar() {
  document.getElementById("modal").style.display = "block";
  document.getElementById("modalTitle").innerText = "Novo Evento";

  limparForm();

  document.getElementById("botoes").innerHTML = `
    <button onclick="salvarEvento()">Salvar</button>
  `;
}

function abrirModalEditar(evento) {
  document.getElementById("modal").style.display = "block";
  document.getElementById("modalTitle").innerText = "Editar Evento";

  document.getElementById("editId").value = evento.id;
  document.getElementById("titulo").value = evento.titulo;
  document.getElementById("inicio").value = formatarData(evento.inicio);
  document.getElementById("fim").value = formatarData(evento.fim);
  document.getElementById("categoria").value = evento.categoria;

  // 🔥 CARREGA NOTAS
  document.getElementById("notas").value = evento.notas || "";

  document.getElementById("botoes").innerHTML = `
    <button onclick="atualizarEvento()">Atualizar</button>
    <button onclick="deletarEvento()">Deletar</button>
  `;
}

function fecharModal() {
  document.getElementById("modal").style.display = "none";
}

// ===== UTIL =====
function formatarData(data) {
  if (!data) return "";
  const d = new Date(data);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function formatarDataBR(data) {
  if (!data) return "—";
  const d = new Date(data);
  return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
}

function normalizarTexto(txt) {
  return (txt || "").trim();
}

function calcularDuracao(inicio, fim) {
  const start = new Date(inicio);
  const end = fim ? new Date(fim) : new Date(inicio);

  let anos = end.getFullYear() - start.getFullYear();
  let meses = end.getMonth() - start.getMonth();
  let dias = end.getDate() - start.getDate();

  if (dias < 0) { meses--; dias += 30; }
  if (meses < 0) { anos--; meses += 12; }

  let partes = [];
  if (anos > 0) partes.push(`${anos} ano${anos>1?'s':''}`);
  if (meses > 0) partes.push(`${meses} mês${meses>1?'es':''}`);
  if (dias > 0) partes.push(`${dias} dia${dias>1?'s':''}`);

  return partes.length ? partes.join(", ") : "Mesmo dia";
}

// ===== TIMELINE =====
function carregarTimeline() {
  fetch(API_URL)
    .then(res => res.json())
    .then(data => {

      const items = data.map(e => {

        let notasPreview = e.notas ? `<br><em>${e.notas.substring(0,100)}...</em>` : "";

        return {
          id: Number(e.id),
          content: "",
          start: e.inicio,
          end: e.fim || null,
          group: normalizarTexto(e.categoria),
          subgroup: e.id,
          title: `
<strong>${e.titulo}</strong><br>
Início: ${formatarDataBR(e.inicio)}<br>
Fim: ${formatarDataBR(e.fim)}<br>
Duração: ${calcularDuracao(e.inicio, e.fim)}
${notasPreview}
          `
        };
      });

      const groups = [...new Set(data.map(e => normalizarTexto(e.categoria)))]
        .map(cat => ({ id: cat, content: cat }));

      if (timeline) timeline.destroy();

      timeline = new vis.Timeline(
        document.getElementById('timeline'),
        items,
        groups,
        {
          orientation: 'top',
          stack: true,
          stackSubgroups: true
        }
      );

      timeline.on('select', function (props) {
        if (props.items.length > 0) {
          const id = props.items[0];
          const evento = data.find(e => Number(e.id) === id);
          abrirModalEditar(evento);
        }
      });

    });
}

// ===== CRUD =====
function gerarNovoId(data) {
  return Math.max(...data.map(e => Number(e.id))) + 1;
}

function salvarEvento() {
  fetch(API_URL)
    .then(res => res.json())
    .then(data => {

      const novoId = gerarNovoId(data);

      fetch(API_URL, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
          data: [{
            id: novoId,
            titulo: document.getElementById("titulo").value,
            inicio: document.getElementById("inicio").value,
            fim: document.getElementById("fim").value,
            categoria: normalizarTexto(document.getElementById("categoria").value),
            notas: document.getElementById("notas").value
          }]
        })
      }).then(() => {
        fecharModal();
        carregarTimeline();
      });
    });
}

function atualizarEvento() {
  const id = document.getElementById("editId").value;

  fetch(`${API_URL}/id/${id}`, {
    method: "PUT",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      data: {
        titulo: document.getElementById("titulo").value,
        inicio: document.getElementById("inicio").value,
        fim: document.getElementById("fim").value,
        categoria: normalizarTexto(document.getElementById("categoria").value),
        notas: document.getElementById("notas").value
      }
    })
  }).then(() => {
    fecharModal();
    carregarTimeline();
  });
}

function deletarEvento() {
  const id = document.getElementById("editId").value;

  fetch(`${API_URL}/id/${id}`, {
    method: "DELETE"
  }).then(() => {
    fecharModal();
    carregarTimeline();
  });
}

function limparForm() {
  document.getElementById("editId").value = "";
  document.getElementById("titulo").value = "";
  document.getElementById("inicio").value = "";
  document.getElementById("fim").value = "";
  document.getElementById("categoria").value = "";
  document.getElementById("notas").value = "";
}

// INIT
carregarTimeline();
</script>

</body>
</html>
